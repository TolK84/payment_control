<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' https://unpkg.com https://telegram.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://n8n.eurasiantech.kz; frame-ancestors 'none'">
  <title>Payment Control</title>
  <link rel="stylesheet" href="style.css">
  <style>[v-cloak]{display:none}</style>
  <script src="https://unpkg.com/vue@3.5.35/dist/vue.global.js" integrity="sha384-UmQhXkGYtdLFmiEUVEftUIiP7sUhWVtDrV3DeJ6D1iBqZMb26288+J9qNNwMhRuC" crossorigin="anonymous"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="config.js"></script>
  <script src="utils/invoiceHelpers.js"></script>
</head>
<body>
  <div id="app" v-cloak>

    <div v-if="authState === 'checking'" class="checking-state">
      <h1>Проверка авторизации...</h1>
    </div>

    <form v-if="authState === 'unauthenticated'" @submit.prevent="processLogin">
      <h1>Авторизация</h1>
      <div class="form-group">
        <label for="login">Логин</label>
        <input type="text" id="login" v-model="login" required>
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" v-model="password" required>
      </div>
      <button type="submit" :disabled="isLoading">
        {{ isLoading ? 'Проверка...' : 'Войти' }}
      </button>
      <p v-if="message" id="message" :style="{ color: messageColor }">{{ message }}</p>
    </form>

    <div v-if="authState === 'authenticated'" class="main-container">
      <user-dashboard v-if="userRole === 'user'" @files-changed="handleFilesChanged"></user-dashboard>
      <admin-dashboard v-if="userRole === 'admin'" @files-changed="handleFilesChanged"></admin-dashboard>
      <approver-dashboard v-if="userRole === 'approver'" :approver-name="userName"></approver-dashboard>
    </div>
  </div>

  <script src="UserDashboard.js"></script>
  <script src="AdminDashboard.js"></script>
  <script src="ApproverDashboard.js"></script>
  <script src="app.js"></script>
</body>
</html>
